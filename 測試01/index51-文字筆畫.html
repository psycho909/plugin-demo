<!doctype html>
<html lang="zh-Hant-TW">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
            body{
                background-color: gray;
            }
            .strokeme-box{
                display: inline-flex;
                    filter: drop-shadow(0px 6px 0px black);
                /* -webkit-text-stroke: 10px #ffffff;
				text-stroke: 10px #ffffff;
                position: relative; */
            }
			.strokeme {
				font-family: "Microsoft JhengHei";
				font-size: 24px;
				font-weight: bold;
				color: #c6a4ff;
				display: flex;
				flex-direction: column;
				line-height: 1;
                z-index: 1;
			}
            span{
                position: relative;
            }
			.strokeme-border::before {
				content: attr(data-storke);
				position: absolute;
				color: #cb9f62;
				-webkit-text-stroke: 10px #000;
				text-stroke: 10px #000;
				z-index: 0;
			}
            .strokeme-border::after {
				content: attr(data-storke);
				position: absolute;
				color: #cb9f62;
				-webkit-text-stroke: 16px #fff;
				text-stroke: 16px #fff;
				z-index: -1;
                top: 0;
                left: 0;
			}
		</style>
	</head>
	<body>
		<!--
Source - https://stackoverflow.com/a/4919231

-->

		<div class="strokeme-box">
		    <div class="strokeme">
    			<span class="strokeme-border" data-storke="刷新一般福袋獎勵"><span>刷新一般福袋獎勵</span></span>
    			<span class="strokeme-border" data-storke="(該區獎勵將回收)"><span>(該區獎勵將回收)</span></span>
    			<span class="strokeme-border" data-storke="19 NTD / 60 HKD"><span>19 NTD / 60 HKD</span></span>
    		</div>
		</div>
	</body>
</html>
